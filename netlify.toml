[build]
  publish = "docs"  # 指定发布目录为 docs 文件夹

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=86400, s-maxage=604800"  # 浏览器缓存1天，CDN缓存7天
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"  # HTML 文件不缓存，确保内容及时更新

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"  # 静态资源缓存1年