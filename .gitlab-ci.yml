image: node:16-alpine  # 稳定且轻量的镜像

pages:
  stage: deploy
  variables:
    PUBLIC_DIR: "public"
  cache:
    key: $CI_COMMIT_REF_SLUG
    paths:
      - node_modules/
  before_script:
    - npm install -g docsify-cli
  script:
    - mkdir -p $PUBLIC_DIR && chmod 755 $PUBLIC_DIR
    - cp -r docs/* $PUBLIC_DIR/
    - [ -f docs/_coverpage.md ] && cp docs/_coverpage.md $PUBLIC_DIR/
    - [ -f docs/_navbar.md ] && cp docs/_navbar.md $PUBLIC_DIR/
  artifacts:
    paths:
      - $PUBLIC_DIR
  only:
    - main
  retry: 1  # 失败时自动重试1次