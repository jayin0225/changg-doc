image: node:16  # 使用稳定的 Node.js 16 LTS 版本

pages:
  stage: deploy
  cache:
    paths:
      - node_modules/  # 缓存依赖
  before_script:
    - npm install -g docsify-cli  # 全局安装 docsify
  script:
    - mkdir -p public
    - cp -r docs/* public/  # 将文档复制到 GitLab Pages 的发布目录
  artifacts:
    paths:
      - public  # 指定发布目录
  only:
    - main     # 仅在 main 分支触发