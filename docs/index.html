    <script>
        // Waline 实例缓存
        let walineInstance = null;

        // 定义 Waline 初始化函数
        function initWaline() {
            // 检查是否存在 waline 容器元素
            const walineEl = document.getElementById('waline');
            if (!walineEl) {
                console.log('[Waline] 未找到 waline 元素');
                return;
            }

            // 如果已存在实例，先销毁
            if (walineInstance) {
                walineInstance.destroy();
                walineInstance = null;
            }

            try {
                walineInstance = Waline.init({
                    serverURL: 'https://waline.haozy.top',
                    el: '#waline',
                    lang: 'zh-CN',
                    path: location.pathname,
                    lazyload: true,
                    meta: ['nick', 'mail'],
                    requiredMeta: ['nick', 'mail'],
                    avatar: 'wavatar',
                    avatarCDN: 'https://cravatar.cn/avatar/',
                    pageSize: 5,
                    commentSorting: 'latest',
                    uploadImage: false,
                    search: false,
                    login: 'disable',
                    reaction: false,
                    recordIP: false,
                    pageview: false,
                    emoji: [
                        'https://cdn.jsdelivr.net/npm/@waline/emojis@1.1.0/weibo',
                        'https://cdn.jsdelivr.net/npm/@waline/emojis@1.1.0/bilibili'
                    ],
                    locale: {
                        placeholder: '留言请提供资源类型...',
                        submit: '提交',
                        reply: '回复',
                        cancelReply: '取消回复',
                        loading: '加载中...',
                        more: '加载更多...',
                        emoji: '表情',
                        seconds: '秒前',
                        minutes: '分钟前',
                        hours: '小时前',
                        days: '天前',
                        now: '刚刚',
                    },
                    highlighter: false,
                    texRenderer: false,
                    // 回复时不自动添加 @用户名前缀
                    onReply: (comment) => {
                        return { content: '' };
                    },
                    // 自定义评论内容渲染，移除回复时的 @用户名
                    onCommentLoaded: (comments) => {
                        comments.forEach(comment => {
                            if (comment.content && comment.content.startsWith('@')) {
                                // 移除 @用户名: 前缀
                                comment.content = comment.content.replace(/^@[^:]+:\s*/, '');
                            }
                        });
                        return comments;
                    },
                });
                console.log('[Waline] 初始化成功');
            } catch (e) {
                console.error('[Waline] 初始化失败:', e);
            }
        }

        // 使用 IntersectionObserver 实现真正的懒加载
        let walineObserver = null;
        function observeWaline() {
            const walineEl = document.getElementById('waline');
            if (!walineEl) return;

            if (walineObserver) {
                walineObserver.disconnect();
            }

            walineObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        initWaline();
                        walineObserver.disconnect();
                    }
                });
            }, { rootMargin: '100px' });

            walineObserver.observe(walineEl);
        }

        // 页面加载完成后观察 Waline 容器
        window.addEventListener('load', observeWaline);

        // docsify 页面切换后重新观察
        window.$docsify = window.$docsify || {};
        window.$docsify.plugins = window.$docsify.plugins || [];
        window.$docsify.plugins.push(function (hook, vm) {
            hook.doneEach(function () {
                observeWaline();
            });
        });
    </script>

    <!-- 音乐插件 - 页面完全加载后延迟5秒加载 -->
    <script>
        window.addEventListener('load', function () {
            setTimeout(function () {
                console.log('[音乐] 开始加载音乐插件...');

                // 带超时的脚本加载函数
                function loadScriptWithTimeout(url, backupUrl, timeout) {
                    return new Promise(function(resolve, reject) {
                        var script = document.createElement('script');
                        var timer = setTimeout(function() {
                            console.log('[音乐] 加载超时，切换到备用CDN...');
                            script.src = backupUrl;
                        }, timeout);

                        script.onload = function() {
                            clearTimeout(timer);
                            resolve(script);
                        };
                        script.onerror = function() {
                            clearTimeout(timer);
                            if (script.src !== backupUrl) {
                                console.log('[音乐] 主CDN失败，切换到备用...');
                                script.src = backupUrl;
                            } else {
                                reject(new Error('主备CDN都失败'));
                            }
                        };
                        script.src = url;
                        document.body.appendChild(script);
                    });
                }

                // 加载APlayer CSS (带备用CDN)
                var aplayerCss = document.createElement('link');
                aplayerCss.rel = 'stylesheet';
                aplayerCss.href = 'https://cdn.jsdelivr.net/npm/aplayer@1/dist/APlayer.min.css';
                aplayerCss.onerror = function() {
                    console.log('[音乐] APlayer CSS 主CDN失败，切换到备用...');
                    this.href = 'https://unpkg.com/aplayer@1/dist/APlayer.min.css';
                };
                document.head.appendChild(aplayerCss);

                // 加载APlayer JS (5秒超时)
                loadScriptWithTimeout(
                    'https://cdn.jsdelivr.net/npm/aplayer@1/dist/APlayer.min.js',
                    'https://unpkg.com/aplayer@1/dist/APlayer.min.js',
                    5000
                ).then(function() {
                    console.log('[音乐] APlayer 加载成功');
                    // 加载Meting JS (5秒超时)
                    return loadScriptWithTimeout(
                        'https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js',
                        'https://unpkg.com/meting@2/dist/Meting.min.js',
                        5000
                    );
                }).then(function() {
                    console.log('[音乐] Meting 加载成功');
                    initMusicPlayer();
                }).catch(function(err) {
                    console.error('[音乐] 加载失败:', err);
                });
            }, 5000);
        });
    </script>

    <!-- 音乐插件 配置 -->
    <!-- 播放器配置说明：
    - 网易云音乐歌单ID（此处示例为8925762343）
    - server: 音乐平台：netease（网易云）、tencent（QQ音乐）、kugou（酷狗）等
    - type: 播放类型：playlist（歌单）、song（单曲）、album（专辑）等
    - fixed: 是否开启吸底模式：true（固定在页面底部）、false（不固定）
    - autoplay: 是否自动播放：true（自动播放）、false（不自动播放，避免浏览器拦截）
    - theme: 播放器主题色（十六进制颜色码，如#b7daff）
    - loop: 循环模式：none（不循环）、all（列表循环）、one（单曲循环）
    - order: 播放顺序：random（随机）、list（列表顺序）
    - volume: 默认音量：0~1之间（0.6表示60%音量）
    - mutex: 是否互斥：true（阻止多个播放器同时播放）、false（允许多个播放器播放）
    - lrc-type: 歌词显示模式：0（不显示）、1（LRC格式）、2（JS解析）、3（外部文件）
    - preload: 预加载：none（不预加载）、metadata（仅元数据）、auto（自动加载）
    - list-folded: 是否默认折叠播放列表：true（折叠）、false（展开）
    -->
    <div id="music-player"></div>

    <script>
        // 音乐播放器初始化 - 在插件加载完成后调用
        function initMusicPlayer() {
            console.log('[音乐] initMusicPlayer 被调用');
            console.log('[音乐] APlayer:', typeof window.APlayer);
            console.log('[音乐] customElements:', typeof window.customElements);

            if (window.APlayer && window.customElements && window.customElements.get('meting-js')) {
                console.log('[音乐] 创建播放器...');
                var container = document.getElementById('music-player');
                var metingEl = document.createElement('meting-js');
                metingEl.setAttribute('id', '8925762343');
                metingEl.setAttribute('server', 'netease');
                metingEl.setAttribute('type', 'playlist');
                metingEl.setAttribute('fixed', 'true');
                metingEl.setAttribute('autoplay', 'false');
                metingEl.setAttribute('theme', '#b7daff');
                metingEl.setAttribute('loop', 'none');
                metingEl.setAttribute('order', 'random');
                metingEl.setAttribute('volume', '0.6');
                metingEl.setAttribute('mutex', 'true');
                metingEl.setAttribute('lrc-type', '1');
                metingEl.setAttribute('preload', 'none');
                metingEl.setAttribute('list-folded', 'true');
                container.appendChild(metingEl);
                console.log('[音乐] 播放器创建成功');
            } else {
                console.log('[音乐] 插件未就绪，等待中...');
                setTimeout(initMusicPlayer, 200);
            }
        }
    </script>



    <script type="text/javascript">
        // 更精确的时间计算函数
        function calculateRunTime() {
            // 设置网站上线时间（注意：月份0-11，4表示5月）
            // 修改这里的日期即可调整起始时间 ▼▼▼
            const startDate = new Date(2024, 3, 3, 21, 0, 0); // 2024年4月3日21:00:00
            const now = new Date();
            const diff = now - startDate; // 获取时间差（毫秒）

            // 计算各时间单位（修正后的计算方式）
            const seconds = Math.floor(diff / 1000) % 60;       // 秒数
            const minutes = Math.floor(diff / (1000 * 60)) % 60; // 分钟
            const hours = Math.floor(diff / (1000 * 60 * 60)) % 24; // 小时
            const days = Math.floor(diff / (1000 * 60 * 60 * 24)); // 总天数
            const years = Math.floor(days / 365);             // 年数
            const remainingDays = days % 365;                 // 剩余天数
            return {
                years,
                days: remainingDays, // 使用取模后的剩余天数
                hours,
                minutes,
                seconds
            };
        }

        /// 更新页面显示的函数
        function updateSiteTime() {
            const timeInfo = calculateRunTime();
            const timeElement = document.getElementById("sitetime");

            if (timeElement) {
                timeElement.innerHTML = `本网站已运行 ${timeInfo.years}年 ${timeInfo.days}天 ${timeInfo.hours}时 ${timeInfo.minutes}分 ${timeInfo.seconds}秒`;
            }

            // 使用requestAnimationFrame优化性能
            requestAnimationFrame(updateSiteTime);
        }

        // 页面加载完成后启动
        if (document.readyState === "complete") {
            updateSiteTime();
        } else {
            window.addEventListener("load", updateSiteTime);
        }
    </script>
