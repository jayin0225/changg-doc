        .floating-cat {
            position: fixed;
            top: 220PX;
            right: calc(50% - 560px);
            /* 动态计算右侧位置 */
            width: 200px;
            height: auto;
            z-index: 1000;

        @keyframes float {
            0% {

                filter: drop-shadow(0px 5px 5px rgba(0, 0, 0, 0.6));
                transform: translatey(0px);

            50% {

                filter: drop-shadow(0px 25px 10px rgba(0, 0, 0, 0.2));
                transform: translatey(-20px);

            100% {

                filter: drop-shadow(0px 5px 5px rgba(0, 0, 0, 0.6));
                transform: translatey(0px);

        <!-- 运行时间统计 -->
        <script type="text/javascript">
            const siteTime = () => {
                window.setTimeout(siteTime, 1000);
                const second = 1000;
                const minute = second * 60;
                const hour = minute * 60;
                const day = hour * 24;
                const year = day * 365;
                const today = new Date();
                const todayYear = today.getFullYear();
                const todayMonth = today.getMonth() + 1;
                const todayDate = today.getDate();
                const todayHour = today.getHours();
                const todayMinute = today.getMinutes();
                const todaySecond = today.getSeconds();
                /* Date.UTC() -- 返回date对象距世界标准时间(UTC)1970年1月1日午夜之间的毫秒数(时间戳)
                year - 作为date对象的年份，为4位年份值
                month - 0-11之间的整数，做为date对象的月份
                day - 1-31之间的整数，做为date对象的天数
                hours - 0(午夜24点)-23之间的整数，做为date对象的小时数
                minutes - 0-59之间的整数，做为date对象的分钟数
                seconds - 0-59之间的整数，做为date对象的秒数
                microseconds - 0-999之间的整数，做为date对象的毫秒数 */
                const t1 = Date.UTC(2025, 4, 8, 0, 0, 0); // 北京时间2020-02-10 00:00:00
                const t2 = Date.UTC(todayYear, todayMonth, todayDate, todayHour, todayMinute, todaySecond);
                const diff = t2 - t1;
                const diffYears = Math.floor(diff / year);
                const diffDays = Math.floor((diff / day) - diffYears * 365);
                const diffHours = Math.floor((diff - (diffYears * 365 + diffDays) * day) / hour);
                const diffMinutes = Math.floor((diff - (diffYears * 365 + diffDays) * day - diffHours * hour) / minute);
                const diffSeconds = Math.floor((diff - (diffYears * 365 + diffDays) * day - diffHours * hour - diffMinutes * minute) / second);
                document.getElementById("sitetime").innerHTML = ` 本网站已运行 ${diffYears} 年 ${diffDays} 天 ${diffHours} 小时 ${diffMinutes} 分钟 ${diffSeconds} 秒 `;
            };
            siteTime();
        </script>
