    <style>
        /* ========================================
           1. CSS变量定义
           ======================================== */
        :root {
            --base-font-size: 15px;
            --content-max-width: 56em;
            --sidebar-width: 20.5rem;
            --sidebar-nav-margin: 1rem 0.1rem 0.1rem;
            --primary-color: #4155c4;
            --secondary-color: #5e72e4;
            --accent-color: #fed24a;
            --shadow-color: rgba(50, 50, 93, 0.1);
            --docsifytabs-border-color: #ededed;
            --docsifytabs-tab-highlight-color: purple;
            --heading-color: var(--primary-color);
        }

        /* ========================================
           2. 图片懒加载
           ======================================== */
        .lazy-load {
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        .lazy-load.loaded {
            opacity: 1;
        }

        /* ========================================
           3. 页面加载动画
           ======================================== */
        #app {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-size: clamp(24px, 8vw, 38px);
        }
        @keyframes dot-animation {
            0%, 50% { opacity: 0.2; }
            25%, 75% { opacity: 1; }
            100% { opacity: 0.2; }
        }
        .loading-text {
            display: inline-block;
            font-weight: bold;
        }
        .loading-text span {
            display: inline-block;
            animation: dot-animation 1.5s infinite ease-in-out;
            margin: 0 2px;
        }
        .loading-text span:nth-child(1) { animation-delay: 0.1s; }
        .loading-text span:nth-child(2) { animation-delay: 0.3s; }
        .loading-text span:nth-child(3) { animation-delay: 0.5s; }
        .loading-text span:nth-child(4) { animation-delay: 0.7s; }

        /* ========================================
           4. 侧边栏样式
           ======================================== */
        aside.sidebar {
            border: none;
            box-shadow: 0 15px 35px var(--shadow-color), 0 5px 15px rgba(0, 0, 0, 0.07);
        }
        aside.sidebar li {
            margin: 0;
            position: relative;
            max-width: 900px;
        }
        aside.sidebar li p {
            padding-left: 22px;
            font-size: 22px;
            font-weight: normal;
        }
        aside.sidebar li a {
            padding: 3px 0 3px 22px;
            font-size: var(--base-font-size);
            line-height: 33px;
        }
        aside.sidebar li.active>a {
            font-size: 22px;
        }
        aside.sidebar ul li.active>a:before {
            content: '' !important;
            position: absolute !important;
            top: 15px !important;
            left: 0 !important;
            width: 10px !important;
            height: 10px !important;
            margin: 0 !important;
            background-color: var(--accent-color);
            border-radius: 50% !important;
            box-shadow: 0 0 0 3px rgba(254, 210, 74, 0.4) !important;
        }
        .sidebar-nav>ul>li>ul>li>ul {
            margin-left: 16px;
        }

        /* ========================================
           5. 侧边栏菜单按钮
           ======================================== */
        .sidebar-toggle .sidebar-toggle-button {
            width: 4.1rem;
            color: #530daf;
            background: rgba(196, 8, 8, 0.27);
            border-radius: 0 8px 8px 0;
            box-shadow: 0 0.155rem 0.25rem rgba(12, 14, 4, 0.075);
            transition: all 0.1s ease;
        }
        .sidebar-toggle-button {
            position: fixed;
            top: 10px;
            left: 10px;
            width: auto;
            height: auto;
            background: none;
            border: none;
            padding: 10px 15px;
            cursor: pointer;
            z-index: 99;
        }
        .sidebar-toggle-button span {
            display: none;
        }
        .sidebar-toggle-button::after {
            content: "菜 单";
            color: #d12a32;
            font-size: 12px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .sidebar-toggle-button:hover::after {
            color: #251ab6;
            text-decoration: underline;
        }
        body.close .sidebar-toggle-button::after {
            content: "菜 单";
        }

        /* ========================================
           6. 主内容区域
           ======================================== */
        #main {
            padding-top: 20px;
            box-shadow: 0 15px 300px 20px var(--shadow-color), 0 10px 15px rgba(0, 0, 0, 0.07);
        }
        article>ul {
            padding: 10px;
            border: none;
            box-shadow: 0 20px 55px var(--shadow-color), 0 0 1px rgba(0, 0, 0, 0.07);
        }
        p.tip, blockquote {
            border-radius: 1px !important;
        }

        /* ========================================
           7. 标题样式
           ======================================== */
        .markdown-section h1,
        .markdown-section h2,
        .markdown-section h3,
        .markdown-section h4 {
            position: relative;
            padding: 0;
            border: none;
        }
        .markdown-section h1, .markdown-section h2, .markdown-section h3 {
            font-weight: 545;
        }
        .markdown-section h4 {
            padding-top: 1.8rem;
            color: #0064ff;
        }
        .no-title-h4 h4 {
            padding-top: 0.5rem;
        }
        .markdown-section h1 a,
        .markdown-section h2 a,
        .markdown-section h3 a,
        .markdown-section h4 a {
            text-decoration: none !important;
        }
        .markdown-section h1:after,
        .markdown-section h2:after,
        .markdown-section h3:after,
        .markdown-section h4:after {
            content: "";
            position: absolute;
            bottom: 0;
            left: -3px;
            display: block;
            border-radius: 15px;
            background: var(--secondary-color);
            opacity: 0.25;
            pointer-events: none;
        }
        .markdown-section h1:after { width: 45px; height: 13px; }
        .markdown-section h2:after { width: 40px; height: 9px; }
        .markdown-section h3:after { width: 30px; height: 7px; }
        .markdown-section h4:after { width: 70px; height: 2px; background: #f1bcbc; opacity: 1; }

        /* ========================================
           8. 链接样式
           ======================================== */
        .markdown-section p a,
        .markdown-section ul a,
        #edit-history a {
            position: relative;
            color: var(--theme-color) !important;
            text-decoration: none !important;
        }
        .markdown-section p a:before,
        .markdown-section ul a:before,
        #edit-history a:before {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background-color: var(--secondary-color);
            transform: scaleX(0);
            transition: transform 0.8s ease;
            backface-visibility: hidden;
        }
        .markdown-section p a:hover:before,
        .markdown-section ul a:hover:before,
        #edit-history a:hover:before {
            transform: scaleX(1);
        }

        /* ========================================
           9. 搜索框样式
           ======================================== */
        .search input {
            width: 100%;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #42b983;
            border-radius: 8px;
            outline: none;
            animation: pulseBorder 2s infinite;
        }
        @keyframes pulseBorder {
            0% { box-shadow: 0 0 0 0 rgba(4, 47, 236, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(66, 185, 131, 0); }
            100% { box-shadow: 0 0 0 0 rgba(66, 185, 131, 0); }
        }
        .search input:focus {
            animation: none;
            border-color: #267c58;
            box-shadow: 0 0 0 3px rgba(66, 185, 131, 0.5);
        }
        .matching-post p {
            display: none !important;
        }

        /* ========================================
           10. MD文件内导航按钮
           ======================================== */
        .markdown-section .game-nav {
            display: flex;
            gap: 15px;
            margin: 25px 0;
            flex-wrap: wrap;
        }
        .markdown-section .game-nav-btn {
            padding: 10px 20px;
            box-sizing: border-box;
            background: #f0f3f9;
            color: #240e9e;
            text-decoration: none;
            border-radius: 6px;
            border: 1px solid #d0d7de;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s ease, border-color 0.2s ease;
            white-space: nowrap;
        }
        .markdown-section .game-nav-btn:hover {
            background: #e1e7ed;
            border-color: #afb8c1;
        }

        /* ========================================
           11. 移动端响应式适配
           ======================================== */
        @media screen and (max-width: 768px) {
            h1 { font-size: 18px !important; }
            h2, h3 { font-size: 16px !important; }
            h4, p { font-size: 13px !important; }
            #main {
                margin-top: 23px;
                padding: 1rem;
            }
            #app {
                min-height: 50vh;
                font-size: clamp(18px, 6vw, 24px);
            }
            .loading-text span {
                animation-duration: 1.2s;
                margin: 0 1px;
            }
            .no-title-h4 h4 {
                padding-top: 0.3rem;
            }
            .markdown-section .game-nav {
                gap: 10px;
                margin: 15px 0;
                overflow-x: auto;
                padding-bottom: 8px;
                scroll-snap-type: x proximity;
            }
            .markdown-section .game-nav-btn {
                padding: 8px 12px;
                font-size: 13px;
                scroll-snap-align: start;
                flex: 0 0 auto;
            }
            .markdown-section .game-nav::-webkit-scrollbar {
                width: 0;
                height: 0;
            }
        }
        @media (max-width: 480px) {
            .markdown-section .game-nav { gap: 8px; }
            .markdown-section .game-nav-btn { padding: 8px 10px; }
        }
    </style>
</head>

                    };
                    metingScript.onerror = function() {
                        console.log('[音乐] Meting 主CDN失败，尝试备用...');
                        var fallback = document.createElement('script');
                        fallback.src = 'https://unpkg.com/meting@2/dist/Meting.min.js';
                        fallback.onload = function() {
                            console.log('[音乐] Meting 备用CDN加载成功');
                            initMusicPlayer();
                        };
                        document.body.appendChild(fallback);
                    };
                    document.body.appendChild(metingScript);
                };
                aplayerScript.onerror = function() {
                    console.log('[音乐] APlayer 主CDN失败，尝试备用...');
                    var fallback = document.createElement('script');
                    fallback.src = 'https://unpkg.com/aplayer@1/dist/APlayer.min.js';
                    fallback.onload = function() {
                        console.log('[音乐] APlayer 备用CDN加载成功');
                        var metingScript = document.createElement('script');
                        metingScript.src = 'https://cdn.jsdelivr.net/npm/meting@2/dist/Meting.min.js';
                        metingScript.onload = function() {
                            console.log('[音乐] Meting JS 加载成功');
                            initMusicPlayer();
                        };
                        metingScript.onerror = function() {
                            var fb = document.createElement('script');
                            fb.src = 'https://unpkg.com/meting@2/dist/Meting.min.js';
                            fb.onload = initMusicPlayer;
                            document.body.appendChild(fb);
                        };
                        document.body.appendChild(metingScript);
                    };
                    document.body.appendChild(fallback);
                };
                document.body.appendChild(aplayerScript);
            }, 5000);
        });
    </script>

    <!-- 音乐插件 配置 -->
    <!-- 播放器配置说明：
    - 网易云音乐歌单ID（此处示例为8925762343）
    - server: 音乐平台：netease（网易云）、tencent（QQ音乐）、kugou（酷狗）等
    - type: 播放类型：playlist（歌单）、song（单曲）、album（专辑）等
    - fixed: 是否开启吸底模式：true（固定在页面底部）、false（不固定）
    - autoplay: 是否自动播放：true（自动播放）、false（不自动播放，避免浏览器拦截）
    - theme: 播放器主题色（十六进制颜色码，如#b7daff）
    - loop: 循环模式：none（不循环）、all（列表循环）、one（单曲循环）
    - order: 播放顺序：random（随机）、list（列表顺序）
    - volume: 默认音量：0~1之间（0.6表示60%音量）
    - mutex: 是否互斥：true（阻止多个播放器同时播放）、false（允许多个播放器播放）
    - lrc-type: 歌词显示模式：0（不显示）、1（LRC格式）、2（JS解析）、3（外部文件）
    - preload: 预加载：none（不预加载）、metadata（仅元数据）、auto（自动加载）
    - list-folded: 是否默认折叠播放列表：true（折叠）、false（展开）
    -->
    <div id="music-player"></div>

    <script>
        // 音乐播放器初始化 - 在插件加载完成后调用
        function initMusicPlayer() {
            console.log('[音乐] initMusicPlayer 被调用');
            console.log('[音乐] APlayer:', typeof window.APlayer);
            console.log('[音乐] customElements:', typeof window.customElements);
            
            if (window.APlayer && window.customElements && window.customElements.get('meting-js')) {
                console.log('[音乐] 创建播放器...');
                var container = document.getElementById('music-player');
                var metingEl = document.createElement('meting-js');
                metingEl.setAttribute('id', '8925762343');
                metingEl.setAttribute('server', 'netease');
                metingEl.setAttribute('type', 'playlist');
                metingEl.setAttribute('fixed', 'true');
                metingEl.setAttribute('autoplay', 'false');
                metingEl.setAttribute('theme', '#b7daff');
                metingEl.setAttribute('loop', 'none');
                metingEl.setAttribute('order', 'random');
                metingEl.setAttribute('volume', '0.6');
                metingEl.setAttribute('mutex', 'true');
                metingEl.setAttribute('lrc-type', '1');
                metingEl.setAttribute('preload', 'none');
                metingEl.setAttribute('list-folded', 'true');
                container.appendChild(metingEl);
                console.log('[音乐] 播放器创建成功');
            } else {
                console.log('[音乐] 插件未就绪，等待中...');
                setTimeout(initMusicPlayer, 200);
            }
        }
    </script>

    <script>
        // 初始化图片懒加载
        function initLazyLoad() {
            var lazyImages = document.querySelectorAll('.lazy-load');

            if ('IntersectionObserver' in window) {
                var imageObserver = new IntersectionObserver(function (entries, observer) {
                    entries.forEach(function (entry) {
                        if (entry.isIntersecting) {
                            var image = entry.target;
                            image.src = image.dataset.src;
                            image.classList.add('loaded');
                            imageObserver.unobserve(image);
                        }
                    });
                });

                lazyImages.forEach(function (image) {
                    imageObserver.observe(image);
                });
            } else {
                lazyImages.forEach(function (image) {
                    image.src = image.dataset.src;
                    image.classList.add('loaded');
                });
            }
        }

        // 性能监控
        function initPerformanceMonitoring() {
            if ('performance' in window && 'measure' in window.performance) {
                var loadTime = window.performance.timing.loadEventEnd - window.performance.timing.navigationStart;
                console.log('页面加载时间:', loadTime, 'ms');
            }
        }

        // 页面加载完成后初始化
        window.addEventListener('load', function () {
            initLazyLoad();
            initPerformanceMonitoring();
        });
    </script>

    <script type="text/javascript">
        // 更精确的时间计算函数
        function calculateRunTime() {
            // 设置网站上线时间（注意：月份0-11，4表示5月）
            // 修改这里的日期即可调整起始时间 ▼▼▼
            const startDate = new Date(2024, 3, 3, 21, 0, 0); // 2024年4月3日21:00:00
            const now = new Date();
            const diff = now - startDate; // 获取时间差（毫秒）

            // 计算各时间单位（修正后的计算方式）
            const seconds = Math.floor(diff / 1000) % 60;       // 秒数
            const minutes = Math.floor(diff / (1000 * 60)) % 60; // 分钟
            const hours = Math.floor(diff / (1000 * 60 * 60)) % 24; // 小时
            const days = Math.floor(diff / (1000 * 60 * 60 * 24)); // 总天数
            const years = Math.floor(days / 365);             // 年数
            const remainingDays = days % 365;                 // 剩余天数
            return {
                years,
                days: remainingDays, // 使用取模后的剩余天数
                hours,
                minutes,
                seconds
            };
        }

        /// 更新页面显示的函数
        function updateSiteTime() {
            const timeInfo = calculateRunTime();
            const timeElement = document.getElementById("sitetime");

            if (timeElement) {
                timeElement.innerHTML = `本网站已运行 ${timeInfo.years}年 ${timeInfo.days}天 ${timeInfo.hours}时 ${timeInfo.minutes}分 ${timeInfo.seconds}秒`;
            }

            // 使用requestAnimationFrame优化性能
            requestAnimationFrame(updateSiteTime);
        }

        // 页面加载完成后启动
        if (document.readyState === "complete") {
            updateSiteTime();
        } else {
            window.addEventListener("load", updateSiteTime);
        }
    </script>
