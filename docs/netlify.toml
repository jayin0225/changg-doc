[[redirects]]
  from = "http://www.haozy.top/*"
  to = "https://www.haozy.top/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://haozy.top/*"
  to = "https://www.haozy.top/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
