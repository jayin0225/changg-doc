[build]
  publish = "."

# 所有请求转发到 index.html（SPA 回退），但返回 404 状态码
# 这样 docsify 才能检测到页面不存在，然后显示 404.md 页面
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404

[[redirects]]
  from = "http://www.haozy.top/*"
  to = "https://www.haozy.top/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://haozy.top/*"
  to = "https://www.haozy.top/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
