[build]
  publish = "."

# SPA 回退配置：优先处理已知路径，未知路径返回 200 让 Docsify 处理
# 这样既能保证 SEO，又能让 Docsify 正确显示 404 页面
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {User-Agent = "*"}

[[redirects]]
  from = "http://www.haozy.top/*"
  to = "https://www.haozy.top/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://haozy.top/*"
  to = "https://www.haozy.top/:splat"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
