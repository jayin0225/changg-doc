<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - 页面不存在</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }
        .error-image {
            max-width: 100%;
            max-height: 400px;
            margin-bottom: 30px;
        }
        .error-message {
            margin-bottom: 30px;
        }
        .error-message p {
            font-size: 18px;
            color: #333;
            margin-bottom: 20px;
        }
        .back-button {
            display: inline-block;
            padding: 15px 30px;
            background-color: #673ab7;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-button:hover {
            background-color: #5a3098;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        @media (max-width: 768px) {
            .error-image {
                max-height: 300px;
            }
            .error-message p {
                font-size: 16px;
            }
            .back-button {
                padding: 12px 24px;
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            .error-image {
                max-height: 200px;
            }
            .error-message p {
                font-size: 14px;
            }
            .back-button {
                padding: 10px 20px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="/assets/img/404.gif" alt="404页" class="error-image">
        <div class="error-message">
            <p>非常抱歉，您访问的页面不存在</p>
            <a href="/" class="back-button">返回首页</a>
        </div>
    </div>
</body>
</html>
